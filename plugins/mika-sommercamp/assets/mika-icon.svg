<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Mika Sommercamp Icon</title>
  <desc id="desc">A Gründerszene-inspired purple assistant icon with a chat mark, app blocks, and a lime launch spark.</desc>
  <defs>
