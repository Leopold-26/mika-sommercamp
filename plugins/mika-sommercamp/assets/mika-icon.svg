    <path d="M64 192H960M64 320H960M64 448H960M64 576H960M64 704H960M64 832H960M192 64V960M320 64V960M448 64V960M576 64V960M704 64V960M832 64V960" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="3"/>
